<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F0804">
<title>EVP CRM - Catering Management</title>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
:root{
  --bg:#0F0804;--card:#1E1008;--c2:#27160A;--sb:#170C05;
  --gold:#C8922A;--gL:#E8B84B;--gF:rgba(200,146,42,.12);
  --bdr:rgba(200,146,42,.22);--b2:rgba(200,146,42,.08);
  --cr:#F0E6D0;--c2r:#C8B898;--mu:#887060;
  --gr:#5A9E6F;--gRF:rgba(90,158,111,.14);
  --rd:#C84030;--rF:rgba(200,64,48,.14);
  --bl:#5880C8;--blF:rgba(88,128,200,.14);
  --or:#D07030;--orF:rgba(208,112,48,.14);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--cr);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;padding-bottom:72px;min-height:100vh;}
a{color:var(--gold);text-decoration:none}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

.spinner{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}

#topbar{background:var(--sb);border-bottom:1px solid var(--bdr);padding:11px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.tbt{flex:1;font-size:14px;font-weight:800;color:var(--cr)}
.tbs{font-size:10px;color:var(--mu);display:block;line-height:1.3}

#botnav{position:fixed;bottom:0;left:0;right:0;background:var(--sb);border-top:1px solid var(--bdr);display:flex;z-index:50;gap:2px;padding:3px;max-width:720px;margin:0 auto;width:100%}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px;cursor:pointer;border:none;background:none;color:var(--mu);font-size:9px;font-weight:600;gap:3px;font-family:inherit;position:relative;border-radius:8px;transition:all .2s}
.nb.on{color:var(--gold);background:rgba(200,146,42,.1)}
.nbi{font-size:20px;line-height:1}

#app{max-width:720px;margin:0 auto}
.pg{padding:14px}
.card{background:var(--c2);border:1px solid var(--bdr);border-radius:10px;padding:13px;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:7px;font-weight:700;font-size:13px;cursor:pointer;border:none;font-family:inherit;-webkit-appearance:none}
.btn:active{opacity:.8}
.bp{background:var(--gold);color:#0F0804}
.bl{width:100%}

.stit{color:var(--gold);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.stit::after{content:"";flex:1;height:1px;background:var(--bdr)}

/* CATERING STYLES */
.catering-card{background:var(--c2);border:1.5px solid var(--bdr);border-radius:10px;padding:12px;margin-bottom:10px}
.catering-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.catering-name{font-weight:800;color:var(--gL);font-size:13px}
.catering-phone{color:var(--mu);font-size:10px;margin-top:2px}
.catering-status{font-size:9px;font-weight:800;padding:4px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px}
.status-new{background:var(--blF);color:var(--bl)}
.status-contacted{background:var(--orF);color:var(--or)}
.status-interested{background:rgba(144,96,200,0.15);color:#9060C8}
.status-converted{background:var(--gRF);color:var(--gr)}

.catering-details{font-size:11px;color:var(--c2r);margin-bottom:8px;line-height:1.5}
.catering-menus{background:rgba(200,146,42,0.08);padding:8px;border-radius:6px;font-size:10px;margin-bottom:8px;color:var(--cr)}
.catering-pricing{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--gold);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
.catering-actions{display:flex;gap:6px}
.action-btn{flex:1;padding:7px;border-radius:6px;font-size:9px;font-weight:700;cursor:pointer;border:1px solid var(--bdr);background:var(--c2);color:var(--mu);text-align:center;transition:all 0.2s}
.action-btn.primary{background:var(--gold);color:#0F0804;border:none}
.action-btn:active{opacity:0.8}

.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--c2);border:1px solid var(--bdr);border-radius:8px;padding:10px;text-align:center}
.stat-icon{font-size:24px;margin-bottom:4px}
.stat-value{font-size:18px;font-weight:800;color:var(--gold);line-height:1}
.stat-label{font-size:9px;color:var(--mu);margin-top:2px;text-transform:uppercase;font-weight:700}

.empty-state{text-align:center;padding:40px 20px;color:var(--mu)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.5}

.filters-bar{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:3px;scrollbar-width:none}
.filters-bar::-webkit-scrollbar{display:none}
.filter-btn{padding:6px 12px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--bdr);background:var(--c2);color:var(--mu);white-space:nowrap;flex-shrink:0;font-family:inherit;transition:all 0.2s}
.filter-btn.active{background:var(--gold);color:#0F0804;border-color:var(--gold)}

.loading{display:flex;align-items:center;justify-content:center;min-height:200px;gap:10px}
.loading-text{color:var(--mu);font-size:12px}

.error-box{background:rgba(200,64,48,0.2);border:1px solid rgba(200,64,48,0.5);border-radius:8px;padding:12px;color:#ff8888;font-size:11px;margin-bottom:10px}
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div style="flex:1">
      <div class="tbt">EVP CRM</div>
      <div class="tbs">🍽️ Catering Management</div>
    </div>
  </div>

  <div id="pages"></div>

  <div id="botnav">
    <button class="nb on" onclick="showPage('dashboard')" title="Dashboard">
      <div class="nbi">📊</div>
      <div>Dashboard</div>
    </button>
    <button class="nb" onclick="showPage('catering')" title="Catering">
      <div class="nbi">🍽️</div>
      <div>Catering</div>
    </button>
    <button class="nb" onclick="showPage('menus')" title="Menus">
      <div class="nbi">📖</div>
      <div>Menus</div>
    </button>
    <button class="nb" onclick="showPage('settings')" title="Settings">
      <div class="nbi">⚙️</div>
      <div>Settings</div>
    </button>
  </div>
</div>

<script>
// Firebase Config
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyC2c1V3cYDX5Njc78BGvbr43caM089IuiE",
  authDomain: "evp-crm.firebaseapp.com",
  databaseURL: "https://evp-crm-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "evp-crm",
  storageBucket: "evp-crm.firebasestorage.app",
  messagingSenderId: "78324247402",
  appId: "1:78324247402:web:f4060a2bf5b04baf411313"
};

var db = null;
var firebaseReady = false;

// Initialize Firebase when scripts load
function initFirebase() {
  try {
    if (firebase && !firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.database();
      firebaseReady = true;
      console.log('✅ Firebase initialized');
      loadCateringLeads();
    }
  } catch (e) {
    console.error('Firebase init error:', e);
    firebaseReady = false;
  }
}

// Check if Firebase is ready
function waitForFirebase() {
  if (typeof firebase === 'undefined') {
    setTimeout(waitForFirebase, 100);
  } else {
    initFirebase();
  }
}

// Sample menu data
const menus = {
  breakfast: [
    { id: 'B-01', tier: 'bronze', tagline: 'South Indian Breakfast', price: 250, items: 8 },
    { id: 'B-02', tier: 'bronze', tagline: 'Traditional Mix', price: 280, items: 8 },
    { id: 'B-03', tier: 'silver', tagline: 'Premium South Indian', price: 350, items: 10 },
    { id: 'B-04', tier: 'silver', tagline: 'Grand Breakfast', price: 380, items: 12 },
    { id: 'B-05', tier: 'silver', tagline: 'Premium Plus', price: 400, items: 13 },
    { id: 'B-06', tier: 'platinum', tagline: 'Luxury Buffet', price: 450, items: 17 },
    { id: 'B-07', tier: 'platinum', tagline: 'Supreme', price: 480, items: 20 },
    { id: 'B-08', tier: 'platinum', tagline: 'Royal Welcome', price: 520, items: 20 },
    { id: 'B-09', tier: 'platinum', tagline: 'Premium Celebration', price: 550, items: 25 },
    { id: 'B-10', tier: 'platinum', tagline: 'Ultimate Grand', price: 600, items: 35 }
  ],
  dinner: [
    { id: 'D-01', tier: 'bronze', tagline: 'Traditional South', price: 300, items: 9 },
    { id: 'D-02', tier: 'bronze', tagline: 'Classic Feast', price: 350, items: 12 },
    { id: 'D-03', tier: 'silver', tagline: 'Premium Package', price: 420, items: 16 },
    { id: 'D-04', tier: 'silver', tagline: 'Grand Experience', price: 480, items: 21 },
    { id: 'D-05', tier: 'platinum', tagline: 'South + North', price: 550, items: 26 },
    { id: 'D-06', tier: 'platinum', tagline: 'Premium + Counters', price: 600, items: 28 },
    { id: 'D-07', tier: 'platinum', tagline: 'Star Package', price: 680, items: 31 },
    { id: 'D-08', tier: 'platinum', tagline: 'Royal Celebration', price: 750, items: 33 },
    { id: 'D-09', tier: 'platinum', tagline: 'Grand + Dessert', price: 850, items: 36 },
    { id: 'D-10', tier: 'platinum', tagline: 'Ultimate Luxury', price: 950, items: 40 }
  ]
};

let cateringLeads = [];
let currentPage = 'dashboard';
let currentFilter = 'all';

// Load catering leads from Firebase
function loadCateringLeads() {
  if (!firebaseReady || !db) {
    console.log('Firebase not ready yet');
    return;
  }

  db.ref('catering_leads').orderByChild('createdAt').limitToLast(50).once('value', snapshot => {
    cateringLeads = [];
    snapshot.forEach(child => {
      cateringLeads.unshift(child.val());
    });
    console.log('✅ Loaded', cateringLeads.length, 'catering leads');
    updateAllPages();
  }).catch(err => {
    console.error('Error loading leads:', err);
  });
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nb').forEach(n => n.classList.remove('on'));
  event.target.closest('.nb').classList.add('on');
  
  switch(page) {
    case 'dashboard':
      showDashboard();
      break;
    case 'catering':
      showCatering();
      break;
    case 'menus':
      showMenus();
      break;
    case 'settings':
      showSettings();
      break;
  }
}

function showDashboard() {
  const newCount = cateringLeads.filter(l => l.status === 'new').length;
  const convertedCount = cateringLeads.filter(l => l.status === 'converted').length;
  const totalRevenue = cateringLeads.reduce((sum, l) => sum + (l.totalCost || 0), 0);

  let html = `
    <div class="pg">
      <div class="stit">📊 Dashboard</div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">🍽️</div>
          <div class="stat-value">${cateringLeads.length}</div>
          <div class="stat-label">Total Leads</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✨</div>
          <div class="stat-value">${newCount}</div>
          <div class="stat-label">New Leads</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div class="stat-value">${convertedCount}</div>
          <div class="stat-label">Conversions</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💰</div>
          <div class="stat-value">${(totalRevenue/100000).toFixed(1)}L</div>
          <div class="stat-label">Revenue</div>
        </div>
      </div>

      <div class="card">
        <div class="stit">🍽️ Recent Catering Leads</div>
        <div id="dashLeads"></div>
      </div>
    </div>
  `;
  
  document.getElementById('pages').innerHTML = html;
  
  let dashHtml = '';
  if (cateringLeads.length === 0) {
    dashHtml = '<div style="text-align: center; color: var(--mu); padding: 20px; font-size: 12px;">No catering leads yet</div>';
  } else {
    cateringLeads.slice(0, 5).forEach(lead => {
      dashHtml += `
        <div class="catering-card">
          <div class="catering-header">
            <div>
              <div class="catering-name">${lead.name}</div>
              <div class="catering-phone">📞 ${lead.phone}</div>
            </div>
            <div class="catering-status status-${lead.status || 'new'}">${(lead.status || 'new').toUpperCase()}</div>
          </div>
          <div class="catering-details">
            📅 ${new Date(lead.eventDate).toLocaleDateString()} | 👥 ${lead.guestCount}
          </div>
          <div class="catering-pricing">
            <span>₹${lead.totalPerGuest}/guest</span>
            <span>Total: ₹${lead.totalCost}</span>
          </div>
        </div>
      `;
    });
  }
  
  document.getElementById('dashLeads').innerHTML = dashHtml;
}

function showCatering() {
  let html = `
    <div class="pg">
      <div class="stit">🍽️ Catering Leads</div>
      
      <div class="filters-bar">
        <button class="filter-btn active" onclick="filterCatering('all', this)">All (${cateringLeads.length})</button>
        <button class="filter-btn" onclick="filterCatering('new', this)">New (${cateringLeads.filter(l => l.status === 'new').length})</button>
        <button class="filter-btn" onclick="filterCatering('contacted', this)">Contacted</button>
        <button class="filter-btn" onclick="filterCatering('interested', this)">Interested</button>
        <button class="filter-btn" onclick="filterCatering('converted', this)">Converted (${cateringLeads.filter(l => l.status === 'converted').length})</button>
      </div>
      
      <div id="cateringLeadsList"></div>
    </div>
  `;
  
  document.getElementById('pages').innerHTML = html;
  filterCatering('all');
}

function filterCatering(status) {
  currentFilter = status;
  let filtered = cateringLeads;
  
  if (status !== 'all') {
    filtered = cateringLeads.filter(l => (l.status || 'new') === status);
  }
  
  let html = '';
  if (filtered.length === 0) {
    html = `<div class="empty-state"><div class="empty-icon">🍽️</div><p>No leads with status "${status}"</p></div>`;
  } else {
    filtered.forEach(lead => {
      const menus = lead.menus ? lead.menus.map(m => m.id).join(', ') : 'None';
      html += `
        <div class="catering-card">
          <div class="catering-header">
            <div>
              <div class="catering-name">${lead.name}</div>
              <div class="catering-phone">📞 ${lead.phone}</div>
            </div>
            <div class="catering-status status-${lead.status || 'new'}">${(lead.status || 'new').toUpperCase()}</div>
          </div>
          <div class="catering-details">
            📅 ${new Date(lead.eventDate).toLocaleDateString()}<br>
            👥 ${lead.guestCount} guests | ${lead.eventType}
          </div>
          <div class="catering-menus">
            📋 Menus: ${menus}
          </div>
          <div class="catering-pricing">
            <span>₹${lead.totalPerGuest}/guest</span>
            <span>₹${lead.totalCost} total</span>
          </div>
          <div class="catering-actions">
            <button class="action-btn primary" onclick="shareLeadLink('${lead.id}')">🔗</button>
            <button class="action-btn" onclick="updateStatus('${lead.id}', 'interested')">👍</button>
            <button class="action-btn" onclick="updateStatus('${lead.id}', 'converted')">💰</button>
          </div>
        </div>
      `;
    });
  }
  
  document.getElementById('cateringLeadsList').innerHTML = html;
}

function updateStatus(leadId, newStatus) {
  if (!firebaseReady || !db) {
    alert('Database not connected');
    return;
  }

  db.ref('catering_leads/' + leadId + '/status').set(newStatus).then(() => {
    console.log('Status updated');
    loadCateringLeads();
  }).catch(err => {
    console.error('Error updating:', err);
    alert('Error: ' + err.message);
  });
}

function showMenus() {
  let html = `<div class="pg"><div class="stit">📖 Catering Menus</div>`;
  
  html += `<div class="card">
    <div style="font-size:12px;color:var(--gold);font-weight:700;margin-bottom:8px">🌅 BREAKFAST MENUS</div>`;
  
  menus.breakfast.forEach(m => {
    html += `
      <div style="padding:8px;background:var(--c2);border-radius:6px;margin-bottom:6px;border-left:3px solid var(--gold)">
        <div style="font-weight:700;color:var(--cr);font-size:11px">${m.id} - ${m.tagline}</div>
        <div style="font-size:10px;color:var(--mu)">💰 ₹${m.price}/guest | 📋 ${m.items} items | 🏅 ${m.tier}</div>
      </div>
    `;
  });
  
  html += `</div><div class="card">
    <div style="font-size:12px;color:var(--gold);font-weight:700;margin-bottom:8px">🌙 DINNER MENUS</div>`;
  
  menus.dinner.forEach(m => {
    html += `
      <div style="padding:8px;background:var(--c2);border-radius:6px;margin-bottom:6px;border-left:3px solid var(--gold)">
        <div style="font-weight:700;color:var(--cr);font-size:11px">${m.id} - ${m.tagline}</div>
        <div style="font-size:10px;color:var(--mu)">💰 ₹${m.price}/guest | 📋 ${m.items} items | 🏅 ${m.tier}</div>
      </div>
    `;
  });
  
  html += `</div></div>`;
  
  document.getElementById('pages').innerHTML = html;
}

function showSettings() {
  document.getElementById('pages').innerHTML = `
    <div class="pg">
      <div class="stit">⚙️ Settings</div>
      <div class="card">
        <div style="font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:8px">WhatsApp Number</div>
        <input type="tel" style="width:100%;background:var(--c2);border:1px solid var(--bdr);border-radius:7px;padding:10px 12px;color:var(--cr);font-size:14px;font-family:inherit;margin-bottom:12px" id="whatsappNum" value="919696962666">
        
        <div style="font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:8px">Email</div>
        <input type="email" style="width:100%;background:var(--c2);border:1px solid var(--bdr);border-radius:7px;padding:10px 12px;color:var(--cr);font-size:14px;font-family:inherit;margin-bottom:12px" id="emailAddr" value="contact@kalyana-sapadu.com">
        
        <button class="btn bl bp" onclick="saveSettings()">💾 Save Settings</button>
        
        <div style="margin-top:16px;padding:12px;background:var(--c2);border:1px solid var(--bdr);border-radius:8px">
          <div style="font-size:10px;color:var(--mu);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">🍽️ Share Menu Selection</div>
          <div style="font-size:10px;color:var(--c2r);margin-bottom:10px">Send this link to customers to browse menus:</div>
          <button class="btn bl bp" onclick="shareMenuLink()" style="margin-bottom:8px">🔗 Copy Menu Link</button>
        </div>
        
        <div style="margin-top:16px;padding:12px;background:var(--c2);border:1px solid var(--bdr);border-radius:8px">
          <div style="font-size:10px;color:var(--mu);font-weight:700;margin-bottom:6px">📊 DATABASE STATUS</div>
          <div style="font-size:11px;color:${firebaseReady ? '#5A9E6F' : '#C84030'};font-weight:700">
            ${firebaseReady ? '✅ Firebase Connected' : '⚠️ Firebase Connecting...'}
          </div>
          <div style="font-size:10px;color:var(--mu);margin-top:6px">Leads stored: ${cateringLeads.length}</div>
        </div>
      </div>
    </div>
  `;
}

function saveSettings() {
  alert('✅ Settings saved!');
}

function shareLeadLink(leadId) {
  const baseUrl = window.location.origin + window.location.pathname.replace('evp-crm-with-catering-FIXED.html', '');
  const shareLink = baseUrl + 'client-lead-view.html?id=' + leadId;
  
  navigator.clipboard.writeText(shareLink).then(() => {
    alert('✅ Link copied!\n\nShare this with your customer:\n' + shareLink);
  }).catch(() => {
    alert('📋 Copy this link:\n' + shareLink);
  });
}

function shareMenuLink() {
  const baseUrl = window.location.origin + window.location.pathname.replace('evp-crm-with-catering-FIXED.html', '');
  const menuLink = baseUrl + 'kalyana-sapadu-menu-selection.html';
  
  navigator.clipboard.writeText(menuLink).then(() => {
    alert('✅ Menu selection link copied!\n\nShare this with customers:\n' + menuLink + '\n\nThey can browse menus and create their own order!');
  }).catch(() => {
    alert('📋 Share this link:\n' + menuLink);
  });
}

function updateAllPages() {
  if (currentPage === 'dashboard') {
    showDashboard();
  } else if (currentPage === 'catering') {
    filterCatering(currentFilter);
  }
}

// Start initialization
window.addEventListener('load', waitForFirebase);

// Show dashboard
showDashboard();
</script>
</body>
</html>
